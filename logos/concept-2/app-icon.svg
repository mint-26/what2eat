<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-labelledby="c2-title">
  <title id="c2-title">what2eat App Icon - Overlapping Plates</title>
  <defs>
    <linearGradient id="c2-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#242424"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <clipPath id="c2-round">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <g clip-path="url(#c2-round)">
    <rect width="1024" height="1024" fill="url(#c2-bg)"/>

    <!-- Two overlapping circles (plates) -->
    <g transform="translate(512, 380)">
      <!-- Left plate - Adrian -->
      <circle cx="-70" cy="0" r="155" fill="none" stroke="#c74b3f" stroke-width="8" opacity="0.9"/>
      <circle cx="-70" cy="0" r="155" fill="#c74b3f" opacity="0.08"/>

      <!-- Right plate - Janina -->
      <circle cx="70" cy="0" r="155" fill="none" stroke="#d4a843" stroke-width="8" opacity="0.9"/>
      <circle cx="70" cy="0" r="155" fill="#d4a843" opacity="0.08"/>

      <!-- Overlap zone - the "match" heart glow -->
      <ellipse cx="0" cy="0" rx="60" ry="90" fill="#c74b3f" opacity="0.12"/>
      <ellipse cx="0" cy="0" rx="60" ry="90" fill="#d4a843" opacity="0.12"/>

      <!-- Small heart in overlap center -->
      <path d="M0,-18 C-6,-28 -22,-28 -22,-14 C-22,-2 0,14 0,14 C0,14 22,-2 22,-14 C22,-28 6,-28 0,-18Z"
            fill="#c47a5a" opacity="0.9"/>

      <!-- Fork on left plate -->
      <g transform="translate(-90, -20) scale(0.5)" opacity="0.4">
        <line x1="0" y1="-40" x2="0" y2="60" stroke="#f5f0eb" stroke-width="6" stroke-linecap="round"/>
        <line x1="-12" y1="-40" x2="-12" y2="-10" stroke="#f5f0eb" stroke-width="4" stroke-linecap="round"/>
        <line x1="0" y1="-40" x2="0" y2="-10" stroke="#f5f0eb" stroke-width="4" stroke-linecap="round"/>
        <line x1="12" y1="-40" x2="12" y2="-10" stroke="#f5f0eb" stroke-width="4" stroke-linecap="round"/>
      </g>

      <!-- Spoon on right plate -->
      <g transform="translate(90, -20) scale(0.5)" opacity="0.4">
        <ellipse cx="0" cy="-28" rx="14" ry="18" fill="none" stroke="#f5f0eb" stroke-width="4"/>
        <line x1="0" y1="-10" x2="0" y2="60" stroke="#f5f0eb" stroke-width="6" stroke-linecap="round"/>
      </g>
    </g>

    <!-- Wordmark -->
    <text x="512" y="660" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="88" font-weight="600" fill="#f5f0eb" letter-spacing="2">
      what<tspan fill="#c74b3f" font-weight="700">2</tspan>eat
    </text>

    <!-- Subtle tagline -->
    <text x="512" y="710" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="28" fill="#6b6560" letter-spacing="6">
      GEMEINSAM GENIESSEN
    </text>
  </g>
</svg>
