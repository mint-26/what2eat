<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 393 852" width="393" height="852" role="img" aria-labelledby="c1s-title">
  <title id="c1s-title">what2eat Splash Screen</title>
  <defs>
    <linearGradient id="c1s-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#222222"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="c1s-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a843"/>
      <stop offset="100%" style="stop-color:#c74b3f"/>
    </linearGradient>
    <radialGradient id="c1s-glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#d4a843;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#d4a843;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="393" height="852" fill="url(#c1s-bg)"/>
  <rect width="393" height="852" fill="url(#c1s-glow)"/>

  <!-- Large "2" icon centered -->
  <g transform="translate(196, 360) scale(0.6)">
    <path d="M-80,-200 C-80,-280 0,-320 60,-280 C120,-240 120,-160 60,-120 L-100,40"
          fill="none" stroke="url(#c1s-accent)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-110,40 L100,40"
          fill="none" stroke="url(#c1s-accent)" stroke-width="48" stroke-linecap="round"/>
    <line x1="-30" y1="-270" x2="-30" y2="-210" stroke="#d4a843" stroke-width="12" stroke-linecap="round"/>
    <line x1="10" y1="-280" x2="10" y2="-220" stroke="#d4a843" stroke-width="12" stroke-linecap="round"/>
    <line x1="50" y1="-270" x2="50" y2="-210" stroke="#d4a843" stroke-width="12" stroke-linecap="round"/>
  </g>

  <!-- Wordmark below -->
  <text x="196" y="470" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="48" font-weight="700" fill="#f5f0eb" letter-spacing="2">
    what<tspan fill="url(#c1s-accent)">2</tspan>eat
  </text>

  <!-- Tagline -->
  <text x="196" y="510" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="16" fill="#a89f95" letter-spacing="3">
    WAS KOCHEN WIR HEUTE?
  </text>
</svg>
